name: Build & Publish Watch Face

on:
  # Manual trigger — use from GitHub UI or Claude mobile app
  workflow_dispatch:
    inputs:
      slug:
        description: 'Watch face slug (directory name under designs/)'
        required: true
        type: string
      track:
        description: 'Play Store track (skip = build only, no publish)'
        required: false
        default: 'skip'
        type: choice
        options:
          - skip
          - internal
          - alpha
          - beta
          - production

  # Auto-trigger on design changes
  push:
    paths:
      - 'designs/**/design.json'
      - 'template/**'
      - 'scripts/**'

jobs:
  # ── Detect which designs changed ──
  detect:
    runs-on: ubuntu-latest
    outputs:
      slugs: ${{ steps.detect.outputs.slugs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slugs=[\"${{ inputs.slug }}\"]" >> "$GITHUB_OUTPUT"
          else
            # Detect changed design.json files
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'designs/*/design.json' 2>/dev/null | \
              sed 's|designs/||;s|/design.json||' | \
              jq -R -s -c 'split("\n") | map(select(. != ""))')

            # If template/scripts changed, build ALL designs
            TMPL_CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'template/' 'scripts/' 2>/dev/null | wc -l)
            if [ "$TMPL_CHANGED" -gt 0 ]; then
              CHANGED=$(ls -d designs/*/ 2>/dev/null | xargs -I{} basename {} | \
                jq -R -s -c 'split("\n") | map(select(. != ""))')
            fi

            # Default to empty if nothing detected
            if [ -z "$CHANGED" ] || [ "$CHANGED" = "[]" ]; then
              CHANGED="[]"
            fi
            echo "slugs=$CHANGED" >> "$GITHUB_OUTPUT"
          fi

  # ── Build each watch face ──
  build:
    needs: detect
    if: needs.detect.outputs.slugs != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        slug: ${{ fromJson(needs.detect.outputs.slugs) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download font (if Google Fonts source)
        run: python3 scripts/download_font.py designs/${{ matrix.slug }}/design.json

      - name: Generate project from template
        run: python3 scripts/generate_project.py designs/${{ matrix.slug }}/design.json

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.jks
            echo "KEYSTORE_PATH=/tmp/release.jks" >> $GITHUB_ENV
          fi

      - name: Build AAB + APK
        working-directory: output/${{ matrix.slug }}
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew clean :app:assembleRelease :app:bundleRelease

      - name: Validate AAB (no dex)
        run: python3 scripts/validate_aab.py output/${{ matrix.slug }}/app/build/outputs/bundle/release/app-release.aab

      - name: Read display name
        id: meta
        run: |
          NAME=$(python3 -c "import json; print(json.load(open('designs/${{ matrix.slug }}/design.json'))['meta']['displayName'])")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          PKG=$(python3 -c "import json; print(json.load(open('designs/${{ matrix.slug }}/design.json'))['meta']['applicationId'])")
          echo "pkg=$PKG" >> "$GITHUB_OUTPUT"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.slug }}-aab
          path: output/${{ matrix.slug }}/app/build/outputs/bundle/release/app-release.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.slug }}-apk
          path: output/${{ matrix.slug }}/app/build/outputs/apk/release/app-release.apk

  # ── Publish to Play Store (only on manual trigger with track != skip) ──
  publish:
    needs: [detect, build]
    if: github.event_name == 'workflow_dispatch' && inputs.track != 'skip'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        slug: ${{ fromJson(needs.detect.outputs.slugs) }}
    steps:
      - uses: actions/checkout@v4

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.slug }}-aab
          path: ./aab/

      - name: Read package name
        id: pkg
        run: |
          PKG=$(python3 -c "import json; print(json.load(open('designs/${{ matrix.slug }}/design.json'))['meta']['applicationId'])")
          echo "packageName=$PKG" >> "$GITHUB_OUTPUT"

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ steps.pkg.outputs.packageName }}
          releaseFiles: ./aab/app-release.aab
          track: ${{ inputs.track }}
          status: completed
